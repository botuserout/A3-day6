                </div>
            </div>
        </div>
    </main>
    <div class="cards-container">
        <div class="card">
            <img src="./src/one.jpg" alt="Episode 1">
            <div class="play-btn"></div>
        </div>
        <div class="card">
            <img src="./src/two.jpg" alt="Episode 2">
            <div class="play-btn"></div>
        </div>
        <div class="card">
            <img src="./src/one.jpg" alt="Episode 3">
            <div class="play-btn"></div>
        </div>
    </div>
    <script>
        const hamburger = document.querySelector('.hamburger');
        const menu = document.querySelector('.menu');
        const menuLinks = document.querySelectorAll('.menu a');

        // Toggle mobile menu
        hamburger.addEventListener('click', () => {
            menu.classList.toggle('mobile-show');
            hamburger.classList.toggle('active');
        });

        // Handle active state on click
        menuLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                // Remove active class from all links
                menuLinks.forEach(l => l.classList.remove('active'));
                // Add active class to clicked link
                link.classList.add('active');
                
                // Close mobile menu if open
                if(menu.classList.contains('mobile-show')) {
                    menu.classList.remove('mobile-show');
                    hamburger.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
