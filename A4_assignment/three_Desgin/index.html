<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Bento Layout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f7f7f9;
      color: #1a1a1a;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px;
    }

    /* wrapper to hold sidebar and grid */
    .main-wrapper {
      position: relative;
      width: 100%;
      max-width: 1100px;
    }

    .left-nav {
      position: absolute;
      left: -80px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 60px;
    }

    .nav-item {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 1px;
      color: #333;
      cursor: pointer;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(11, 45px);
      gap: 24px;
      width: 100%;
    }

    .box {
      border-radius: 32px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    /* little border decoration in top right corner */
    .top-corner-mark {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 10px;
      height: 10px;
      border-top: 2px solid rgba(0,0,0,0.2);
      border-right: 2px solid rgba(0,0,0,0.2);
      z-index: 10;
    }
    
    .top-corner-mark.white-mark {
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* left profile column */
    .profile-box {
      grid-column: 1 / 6;
      grid-row: 1 / 12;
      background: #857be4;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: #fff;
    }

    .pill-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      background: #f7f7f9;
      color: #1a1a1a;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 10;
    }

    .photo-circle {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 220px;
      background-color: #f6a5ff;
      border-radius: 50%;
      border: 4px solid #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .big-name {
      font-size: 64px;
      line-height: 1.1;
      font-weight: 500;
      letter-spacing: -1px;
      margin-bottom: 15px;
    }

    .email-link {
      font-size: 14px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.9;
    }

    .round-badge {
      position: absolute;
      bottom: 40px;
      right: 30px;
      width: 60px;
      height: 60px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 10px;
      text-align: center;
      line-height: 1.2;
    }

    /* header area */
    .heading-section {
      grid-column: 6 / 13;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      position: relative;
    }

    .page-title {
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
    }

    .large-corner {
      position: absolute;
      top: 10px;
      right: 0;
      width: 15px;
      height: 15px;
      border-top: 4px solid #1a1a1a;
      border-right: 4px solid #1a1a1a;
    }

    /* flamingo video box */
    .video-box {
      grid-column: 6 / 11;
      grid-row: 3 / 8;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .play-btn {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 15px solid #1a1a1a;
      margin-left: 5px;
    }

    .stats-box {
      grid-column: 11 / 13;
      grid-row: 3 / 8;
      display: flex;
      flex-direction: column;
    }

    .top-half, .bottom-half {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 30px;
    }

    .top-half {
      background: #bce4d6;
      color: #1a1a1a;
    }
    
    .bottom-half {
      background: #9b82c6;
      color: #fff;
    }

    .num {
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 5px;
    }
    
    .label {
      font-size: 14px;
      opacity: 0.8;
    }

    .client-box {
      grid-column: 6 / 8;
      grid-row: 8 / 12;
      background-color: #5a5a5a;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      font-size: 40px;
    }

    /* bottom right awards */
    .awards-box {
      grid-column: 8 / 13;
      grid-row: 8 / 12;
      display: flex;
      flex-direction: row;
    }

    .dark-side {
      flex: 0 0 45%;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .orange-side {
      flex: 1;
      background-color: #ffcc80;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* image classes */
    .full-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .absolute-cover {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    
    .circle-clip {
      border-radius: 50%;
    }
    
    .contain-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
    }
    
    .z-top {
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    
    <!-- sidebar -->
    <div class="left-nav">
      <div class="nav-item">Clients</div>
      <div class="nav-item">Research</div>
      <div class="nav-item">Portfolio</div>
      <div class="nav-item">Podcast</div>
    </div>

    <!-- main grid -->
    <div class="grid-container">
      
      <!-- profile card -->
      <div class="box profile-box">
        <div class="pill-btn">❖ About Me</div>
        <div class="photo-circle">
          <img src="avatar.png" alt="Jon Daniel" class="full-img circle-clip">
        </div>
        <div class="big-name">Im,<br>Jon<br>Daniel</div>
        <div class="email-link">inquiry@jondaniel.design ✉</div>
        <div class="round-badge">2023<br>PORTFOLIO</div>
      </div>

      <div class="heading-section">
        <h1 class="page-title">Portfolio</h1>
        <div class="large-corner"></div>
      </div>

      <div class="box video-box">
        <img src="flamingo.png" alt="Flamingo Art" class="absolute-cover">
        <div class="top-corner-mark white-mark z-top"></div>
        <div class="play-btn z-top">
          <div class="play-icon"></div>
        </div>
      </div>

      <!-- stats column -->
      <div class="box stats-box">
        <div class="top-corner-mark"></div>
        <div class="top-half">
          <div class="num">251</div>
          <div class="label">Projects</div>
        </div>
        <div class="bottom-half">
          <div class="num">156</div>
          <div class="label">Awards</div>
        </div>
      </div>

      <div class="box client-box">
        <div class="top-corner-mark white-mark"></div>
        <div class="logo-icon"></div>
        <div style="font-size: 14px;">Clients</div>
      </div>

      <div class="box awards-box">
        <div class="top-corner-mark"></div>
        <div class="dark-side">
          <img src="sphere.png" alt="3D Sphere" class="contain-img">
        </div>
        <div class="orange-side">
          <div class="num">172</div>
          <div class="label" style="font-size: 18px; font-weight: 500;">Global Design<br>Awards.</div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
