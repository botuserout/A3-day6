<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Bento Grid</title>
  <style>
    /* Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #f7f7f9;
      color: #1a1a1a;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    /* Main Container (Context for Absolute Sidebar) */
    .portfolio-wrapper {
      position: relative;
      width: 100%;
      max-width: 1100px;
    }

    /* Absolute Left Sidebar */
    .sidebar {
      position: absolute;
      left: -80px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 60px;
    }

    .sidebar-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: #333;
      cursor: pointer;
    }

    /* Core Macro Grid Layout */
    .bento-grid {
      display: grid;
      /* 12 columns for highly flexible width distribution */
      grid-template-columns: repeat(12, 1fr);
      /* 11 rows to manage exact height proportions */
      grid-template-rows: repeat(11, 45px);
      gap: 24px;
      width: 100%;
    }

    /* Base Card Styling */
    .card {
      border-radius: 32px;
      position: relative; /* Context for absolute inner elements */
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    /* Corner Decor Mark (┐) using Absolute Positioning */
    .corner-mark {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 10px;
      height: 10px;
      border-top: 2px solid rgba(0,0,0,0.2);
      border-right: 2px solid rgba(0,0,0,0.2);
      z-index: 10;
    }
    .corner-mark.light {
      border-color: rgba(255,255,255,0.4);
    }

    /* =========================================
       Profile Card (Left)
       ========================================= */
    .profile-card {
      grid-column: 1 / 6;  /* Spans 5 cols */
      grid-row: 1 / 12;    /* Spans all 11 rows */
      background-color: #857be4;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: white;
    }

    .about-tab {
      position: absolute;
      top: 30px;
      left: 30px;
      background: #f7f7f9;
      color: #1a1a1a;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 10;
    }

    .avatar-circle {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 220px;
      background-color: #f6a5ff;
      border-radius: 50%;
      border: 4px solid white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4));
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 20px;
      font-weight: bold;
    }

    .profile-name {
      font-size: 4rem;
      line-height: 1.1;
      font-weight: 500;
      letter-spacing: -1px;
      margin-bottom: 15px;
    }

    .profile-email {
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.9;
    }

    .badge-circle {
      position: absolute;
      bottom: 40px;
      right: 30px;
      width: 60px;
      height: 60px;
      background-color: #1a1a1a;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 0.6rem;
      text-align: center;
      line-height: 1.2;
    }

    /* =========================================
       Title Area (Top Right)
       ========================================= */
    .title-area {
      grid-column: 6 / 13;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      position: relative;
    }

    .title-text {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
    }

    .title-mark {
      position: absolute;
      top: 10px;
      right: 0;
      width: 15px;
      height: 15px;
      border-top: 4px solid #1a1a1a;
      border-right: 4px solid #1a1a1a;
    }

    /* =========================================
       Flamingo Image Card (Center)
       ========================================= */
    .flamingo-card {
      grid-column: 6 / 11;
      grid-row: 3 / 8;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .play-btn {
      position: absolute;
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 15px solid #1a1a1a;
      margin-left: 5px; /* Visual center adjustment */
    }

    /* =========================================
       Stats Card (Right)
       ========================================= */
    .stats-card {
      grid-column: 11 / 13;
      grid-row: 3 / 8;
      display: flex;
      flex-direction: column;
    }

    .stat-top, .stat-bottom {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 30px;
    }

    .stat-top { background-color: #bce4d6; color: #1a1a1a; }
    .stat-bottom { background-color: #9b82c6; color: white; }

    .stat-number { font-size: 2.5rem; font-weight: 800; line-height: 1; margin-bottom: 5px; }
    .stat-label { font-size: 0.9rem; opacity: 0.8; }

    /* =========================================
       Apple Card (Bottom Center)
       ========================================= */
    .apple-card {
      grid-column: 6 / 8;
      grid-row: 8 / 12;
      background-color: #5a5a5a;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .apple-logo { font-size: 2.5rem; }

    /* =========================================
       Awards Card (Bottom Right)
       ========================================= */
    .awards-card {
      grid-column: 8 / 13;
      grid-row: 8 / 12;
      display: flex;
      flex-direction: row;
    }

    .awards-left {
      flex: 0 0 45%;
      background-color: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sphere-placeholder {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #a8edea, #9b82c6);
    }

    .awards-right {
      flex: 1;
      background-color: #ffcc80;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

  </style>
</head>
<body>

  <div class="portfolio-wrapper">
    
    <div class="sidebar">
      <div class="sidebar-text">Clients</div>
      <div class="sidebar-text">Research</div>
      <div class="sidebar-text">Portfolio</div>
      <div class="sidebar-text">Podcast</div>
    </div>

    <div class="bento-grid">
      
      <div class="card profile-card">
        <div class="about-tab">❖ About Me</div>
        <div class="avatar-circle">
          <img src="avatar.png" alt="Jon Daniel" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>
        <div class="profile-name">Im,<br>Jon<br>Daniel</div>
        <div class="profile-email">inquiry@jondaniel.design ✉</div>
        <div class="badge-circle">2023<br>PORTFOLIO</div>
      </div>

      <div class="title-area">
        <h1 class="title-text">Portfolio</h1>
        <div class="title-mark"></div>
      </div>

      <div class="card flamingo-card">
        <img src="flamingo.png" alt="Flamingo Art" style="position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1;">
        <div class="corner-mark light" style="z-index: 2;"></div>
        <div class="play-btn" style="z-index: 2;">
          <div class="play-icon"></div>
        </div>
      </div>

      <div class="card stats-card">
        <div class="corner-mark"></div>
        <div class="stat-top">
          <div class="stat-number">251</div>
          <div class="stat-label">Projects</div>
        </div>
        <div class="stat-bottom">
          <div class="stat-number">156</div>
          <div class="stat-label">Awards</div>
        </div>
      </div>

      <div class="card apple-card">
        <div class="corner-mark light"></div>
        <div class="apple-logo"></div>
        <div style="font-size: 0.9rem;">Clients</div>
      </div>

      <div class="card awards-card">
        <div class="corner-mark"></div>
        <div class="awards-left">
          <img src="sphere.png" alt="3D Sphere" style="width: 110px; height: 110px; object-fit: contain;">
        </div>
        <div class="awards-right">
          <div class="stat-number">172</div>
          <div class="stat-label" style="font-size: 1.1rem; font-weight: 500;">Global Design<br>Awards.</div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
